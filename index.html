<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ai Factory — нейросети, что работают</title>
<meta name="description" content="Нейросети и AI-инструменты простыми словами. Гайды, подборки, фишки." />
<meta property="og:title" content="Ai Factory" />
<meta property="og:description" content="Нейросети и AI-инструменты простыми словами." />
<style>
  :root{ --bg:#0b0e14; --card:#141a24; --line:#222c3a; --txt:#eef3f8; --muted:#93a0b2; --green:#A3E635; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:radial-gradient(1200px 600px at 50% -10%, #15203020, transparent), var(--bg);color:var(--txt);
       font-family:-apple-system,Segoe UI,Roboto,sans-serif;min-height:100vh;display:flex;justify-content:center;}
  .wrap{width:100%;max-width:440px;padding:48px 22px 40px;text-align:center;}
  .logo{width:96px;height:96px;border-radius:26px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;
        background:linear-gradient(145deg,#1c2735,#0e141d);border:1px solid var(--line);
        font-weight:900;font-size:38px;color:var(--green);box-shadow:0 12px 40px #0008;}
  h1{font-size:26px;font-weight:800;letter-spacing:-0.5px;}
  .tag{color:var(--muted);font-size:15px;margin:8px 0 28px;line-height:1.5;}
  a.btn{display:flex;align-items:center;gap:14px;width:100%;padding:17px 20px;margin:12px 0;border-radius:16px;
        background:var(--card);border:1px solid var(--line);color:var(--txt);text-decoration:none;font-size:17px;font-weight:700;
        transition:transform .12s ease, border-color .12s ease;}
  a.btn:active{transform:scale(.98);}
  a.btn .ico{font-size:22px;width:26px;text-align:center;}
  a.btn .arr{margin-left:auto;color:var(--muted);font-weight:400;}
  a.tg{background:linear-gradient(135deg,#2aa3e6,#1c84c6);border-color:#2aa3e6;color:#fff;}
  a.tg .arr{color:#ffffffcc;}
  a.yt:hover{border-color:#ff4d4f;} a.ig:hover{border-color:#e879f9;}
  .foot{color:var(--muted);font-size:12px;margin-top:30px;line-height:1.6;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">AI</div>
    <h1>Ai Factory</h1>
    <div class="tag">🏭 Тестирую нейросети за тебя.<br>Что реально работает — простыми словами.</div>

    <a class="btn tg" href="https://t.me/aifactorygb"><span class="ico">📲</span> Telegram-канал <span class="arr">→</span></a>
    <a class="btn yt" href="https://youtube.com/@aifactorygb"><span class="ico">▶️</span> YouTube <span class="arr">→</span></a>
    <a class="btn ig" href="https://instagram.com/aifactorygb"><span class="ico">📸</span> Instagram <span class="arr">→</span></a>

    <div class="foot">🤖 Контент создаётся с помощью нейросетей<br>© Ai Factory</div>
  </div>
</body>
</html>
